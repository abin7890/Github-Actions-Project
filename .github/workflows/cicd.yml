name: CICD Pipeline

on:
  push:
    branches:
      - main

jobs:
  compile:
    runs-on: self-hosted
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile Application
        run: mvn compile

  test:
    runs-on: self-hosted
    needs: compile
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Unit Tests
        run: mvn test

  security_checks:
    runs-on: self-hosted
    needs: test
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Trivy Filesystem Scan
        run: |
          trivy fs --format json --output fs-report.json .

      - name: Gitleaks Scan
        run: |
          gitleaks detect --source . --report-format json --report-path gitleaks-report.json

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            fs-report.json
            gitleaks-report.json

  build-project-and-sonar-scan:
    runs-on: self-hosted
    needs: security_checks
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  build-docker-image-and-push:
    runs-on: self-hosted
    needs: build-project-and-sonar-scan
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: app

      - name: List downloaded files
        run: ls -R app

      - name: Debug Docker environment
        run: |
          docker --version || echo "Docker not found"
          docker info || echo "Docker daemon not running"
          whoami
          groups

      - name: Fix Docker permissions (if needed)
        run: |
          if ! docker info &>/dev/null; then
            echo "Attempting to fix Docker permissions..."
            sudo chmod 666 /var/run/docker.sock || true
          fi
        continue-on-error: true

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: abin89/bankapp:latest

  Deploy_to_Kubernetes:
    runs-on: self-hosted
    needs: build-docker-image-and-push
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: latest

      - name: Get EKS cluster name
        run: |
          # Use cluster name from secret
          if [ -n "${{ secrets.EKS_CLUSTER_NAME }}" ]; then
            echo "CLUSTER_NAME=${{ secrets.EKS_CLUSTER_NAME }}" >> $GITHUB_ENV
          else
            # Auto-discover cluster if only one exists
            CLUSTER=$(aws eks list-clusters --region ap-south-1 --query 'clusters[0]' --output text)
            if [ "$CLUSTER" != "None" ] && [ -n "$CLUSTER" ]; then
              echo "CLUSTER_NAME=$CLUSTER" >> $GITHUB_ENV
              echo "Auto-discovered cluster: $CLUSTER"
            else
              echo "ERROR: No EKS cluster found. Please set EKS_CLUSTER_NAME secret."
              exit 1
            fi
          fi

      - name: Configure kubeconfig dynamically
        run: |
          echo "Configuring kubeconfig for cluster: $CLUSTER_NAME"
          aws eks update-kubeconfig --region ap-south-1 --name $CLUSTER_NAME
          
          # Verify configuration
          echo "Verifying kubectl connection..."
          kubectl cluster-info
          kubectl get nodes

      - name: Verify deployment permissions
        run: |
          echo "Checking RBAC permissions..."
          kubectl auth can-i get pods
          kubectl auth can-i create deployments
          kubectl auth can-i get services

      - name: Debug kubeconfig (if connection fails)
        if: failure()
        run: |
          echo "=== Kubeconfig file info ==="
          ls -la $HOME/.kube/config
          echo "=== Current context ==="
          kubectl config current-context 2>&1 || echo "Failed to get context"
          echo "=== List all contexts ==="
          kubectl config get-contexts 2>&1 || echo "Failed to list contexts"

      - name: Deploy to EKS
        run: |
          # Validate manifest exists
          if [ ! -f "ds.yml" ]; then
            echo "ERROR: ds.yml not found!"
            echo "Available files:"
            ls -la
            exit 1
          fi
          
          echo "Applying deployment manifest..."
          kubectl apply -f ds.yml
          
          echo "Deployment status:"
          kubectl get all
          
          echo "Recent events:"
          kubectl get events --sort-by='.lastTimestamp' | tail -10
